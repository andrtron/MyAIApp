name: Diagnose Repo

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show repository tree (top-level)
        run: ls -R . | head -n 200

      - name: Show key files
        run: |
          echo "=== settings.gradle ==="
          cat settings.gradle || echo "missing"
          echo "=== app/build.gradle ==="
          cat app/build.gradle || echo "missing"
          echo "=== app/src/main/AndroidManifest.xml ==="
          cat app/src/main/AndroidManifest.xml || echo "missing"
          echo "=== app/src/main/java/com/example/myaiapp/MainActivity.kt ==="
          cat app/src/main/java/com/example/myaiapp/MainActivity.kt || echo "missing"

      - name: Java version
        run: java -version || echo "java not installed"

      - name: Gradle version (if available)
        run: |
          if [ -x "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew --version || true
          else
            echo "No gradlew wrapper present"
          fi
