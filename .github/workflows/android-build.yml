name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install unzip and wget
        run: sudo apt-get update && sudo apt-get install -y unzip wget

      - name: Download and unzip Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          unzip -q gradle-8.1.1-bin.zip
          echo "${{ github.workspace }}/gradle-8.1.1/bin" >> $GITHUB_PATH

      - name: Build APK (release if possible, fallback to debug)
        run: |
          if [ -x "./gradlew" ]; then
            ./gradlew clean assembleRelease || ./gradlew assembleDebug
          else
            gradle-8.1.1/bin/gradle clean assembleDebug
          fi

      - name: Collect APK
        uses: actions/upload-artifact@v4
        with:
          name: built-apk
          path: app/build/outputs/**/*.apk
