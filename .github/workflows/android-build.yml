name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Download Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          unzip -q gradle-8.1.1-bin.zip
          echo "::add-path::$(pwd)/gradle-8.1.1/bin"

      - name: Build APK (debug fallback)
        run: |
          ./gradlew clean assembleRelease || (echo "Gradle wrapper failed, using installed gradle" && \
            ./gradle-8.1.1/bin/gradle clean assembleDebug)

      - name: Collect APK
        uses: actions/upload-artifact@v4
        with:
          name: built-apk
          path: app/build/outputs/**/*.apk
