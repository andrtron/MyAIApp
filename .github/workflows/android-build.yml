name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install prerequisites (verbose)
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y unzip wget zip

      - name: Set ANDROID_SDK_ROOT
        run: echo "ANDROID_SDK_ROOT=$RUNNER_TEMP/android-sdk" >> $GITHUB_ENV

      - name: Install Android command line tools (with retries & verbose)
        run: |
          set -eux
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          ZIP_NAME=commandlinetools-linux-13114758_latest.zip
          URL="https://dl.google.com/android/repository/${ZIP_NAME}"
          for i in 1 2 3; do
            echo "Attempt $i to download $ZIP_NAME"
            if wget "$URL" -O cmdline.zip; then
              break
            else
              echo "Download failed, retrying after sleep..."
              sleep 5
            fi
          done
          ls -lah .
          unzip -o cmdline.zip -d temp-tools
          ls -lah temp-tools
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv temp-tools/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
          ls -R "$ANDROID_SDK_ROOT/cmdline-tools/latest" | head -n 80
          rm -rf cmdline.zip temp-tools

      - name: Install Android SDK components
        run: |
          set -eux
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses --sdk_root="$ANDROID_SDK_ROOT"

      - name: Add Android tools to PATH
        run: |
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> $GITHUB_PATH
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Download and unpack Gradle
        run: |
          set -eux
          GRADLE_VER=8.1.1
          wget "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" -O gradle.zip
          unzip -q gradle.zip
          echo "${{ github.workspace }}/gradle-${GRADLE_VER}/bin" >> $GITHUB_PATH

      - name: Build APK (с подробным выводом)
        run: |
          set -eux
          if [ -x "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew clean assembleDebug --stacktrace --info --warning-mode all
          else
            gradle clean assembleDebug --stacktrace --info --warning-mode all
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-apk
          path: app/build/outputs/**/*.apk
