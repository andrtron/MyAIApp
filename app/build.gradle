// MyAIApp/app/build.gradle
plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    compileSdk 34
    defaultConfig {
        applicationId "com.example.myaiapp"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            // можно включить минификацию при желании
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.9.0'

    // Vosk
    implementation 'com.alphacephei:vosk-android:0.3.38'
    // Porcupine (предполагается форк с русским wake-word)
    implementation 'ai.picovoice:porcupine-android:1.9.0'
    // Жизненный цикл (если понадобится)
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.1'
}
